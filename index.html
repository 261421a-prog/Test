!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator with Fractions</title>
<style>
    body {
        font-family: Arial;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #f0f0f0;
    }
    .calculator {
        background: #222;
        padding: 20px;
        border-radius: 10px;
        width: 260px;
    }
    #display {
        width: 100%;
        height: 50px;
        font-size: 20px;
        margin-bottom: 10px;
        text-align: right;
        padding: 5px;
        border: none;
    }
    .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 5px;
    }
    button {
        padding: 15px;
        font-size: 16px;
        border: none;
        cursor: pointer;
        border-radius: 5px;
    }
    button:hover {
        background: #ddd;
    }
    .equal {
        background: orange;
    }
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button onclick="press('/')">/</button>

        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button onclick="press('*')">*</button>

        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button onclick="press('-')">-</button>

        <button onclick="press('0')">0</button>
        <button onclick="press('.')">.</button>
        <button onclick="calculate()" class="equal">=</button>
        <button onclick="press('+')">+</button>

        <button onclick="clearDisplay()">C</button>
        <button onclick="press('(')">(</button>
        <button onclick="press(')')">)</button>
        <button onclick="toFraction()">Frac</button>
    </div>
</div>

<script>
let display = document.getElementById('display');

function press(value) {
    display.value += value;
}

function clearDisplay() {
    display.value = '';
}

function calculate() {
    try {
        display.value = eval(display.value);
    } catch {
        display.value = "Error";
    }
}

// Convert decimal to fraction
function toFraction() {
    let value = parseFloat(display.value);
    if (isNaN(value)) {
        display.value = "Error";
        return;
    }

    let tolerance = 1.0E-6;
    let h1 = 1, h2 = 0, k1 = 0, k2 = 1;
    let b = value;

    do {
        let a = Math.floor(b);
        let aux = h1;
        h1 = a * h1 + h2;
        h2 = aux;
        aux = k1;
        k1 = a * k1 + k2;
        k2 = aux;
        b = 1 / (b - a);
    } while (Math.abs(value - h1 / k1) > value * tolerance);

    display.value = h1 + "/" + k1;
}
</script>

</body>
</html>
